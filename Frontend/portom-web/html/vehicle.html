<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kendaraan - Portal Transportasi</title>
    <!-- Menghubungkan ke file css eksternal milikmu -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav id="navbar">
        <span class="nav-brand">🚌 PORTOM</span>
        <div class="nav-links">
            <button onclick="window.location.href='dashboard.html'" id="nav-dashboard">Dashboard</button>
            <button onclick="window.location.href='vehicle.html'" id="nav-kendaraan" class="active">Kendaraan</button>
            <button onclick="window.location.href='pangkalan.html'" id="nav-pangkalan">Pangkalan</button>
        </div>
    </nav>

    <div class="page active" id="page-kendaraan">
      <div class="main-content">
        <div class="page-title">Kendaraan</div>
        <div class="page-sub">Tambah dan kelola data kendaraan</div>
     
        <!-- FORM TAMBAH (CREATE) -->
        <div class="form-card">
          <h2>Tambah Kendaraan</h2>
          <div class="form-row-3">
            <div class="form-group">
              <label>Nama Pemilik</label>
              <input type="text" id="v-nama" placeholder="Budi Santoso"/>
            </div>

            <div class="form-group">
            <label>Jenis Kendaraan</label>
            <select id="v-jenis">
                <option value="">Pilih jenis…</option>
                <option value="Motor">Motor Pribadi</option>
                <option value="Mobil (Sedan/Hatchback)">Mobil (Sedan / Hatchback)</option>
                <option value="Mobil (SUV/MPV/Minivan)">Mobil Keluarga (SUV / MPV)</option>
                <option value="Sepeda Listrik">Sepeda Listrik / Selis</option>
            </select>
            </div>

            <div class="form-group">
              <label>Wilayah</label>
              <input type="text" id="v-wilayah" placeholder="Jember Kota"/>
            </div>
          </div>
          <button class="btn-save" onclick="tambahKendaraan()">Simpan</button>
        </div>
     
        <div class="section-card">
          <div class="section-card-header">
            <h3>Data Kendaraan</h3>
            <span class="badge" id="badge-kendaraan">0 data</span>
          </div>

          <div style="padding: 20px 20px 0 20px;">
              <div id="slot-alarm"></div>
              <div class="section-title">Visualisasi Parking Lot Digital KK Anda</div>
              <div id="parking-lot" class="parking-lot-container"></div>
          </div>

          <!-- TABEL DATA (READ) -->
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Nama Pemilik</th>
                <th>Jenis</th>
                <th>Wilayah</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tbody-kendaraan">
              <tr><td colspan="5" class="empty">Belum ada data</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- MODAL POP-UP EDIT (HIDDEN BY DEFAULT) -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Data Kendaraan</h2>
            <input type="hidden" id="edit-v-id">
            
            <div class="form-group-modal">
                <label>Nama Pemilik</label>
                <input type="text" id="edit-v-nama">
            </div>
            
            <div class="form-group-modal">
                <label>Jenis Kendaraan</label>
                <select id="edit-v-jenis">
                    <option value="Motor">Motor Pribadi</option>
                    <option value="Mobil (Sedan/Hatchback)">Mobil (Sedan / Hatchback)</option>
                    <option value="Mobil (SUV/MPV/Minivan)">Mobil Keluarga (SUV / MPV)</option>
                    <option value="Sepeda Listrik">Sepeda Listrik / Selis</option>
                </select>
            </div>
            
            <div class="form-group-modal">
                <label>Wilayah</label>
                <input type="text" id="edit-v-wilayah">
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="tutupModalEdit()">Batal</button>
                <button class="btn-save-modal" onclick="simpanPerubahanKendaraan()">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <script src="../js/vehicle.js"></script>
</body>
</html>
